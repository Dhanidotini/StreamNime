services:
  app:
    build:
      context: .
      target: runtime

    ports:
      - "8080:80"
      - "443:443"
      - "443:443/udp"

    env_file:
      - .env.production

    volumes:
      - ./storage:/app/storage
      - caddy_data:/data
      - caddy_config:/config

    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    env_file:
      - .env.production

    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  caddy_data:
  caddy_config:
