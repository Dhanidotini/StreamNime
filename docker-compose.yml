services:
  app:
    build:
      context: .
      target: runtime
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - SERVER_NAME=${SERVER_NAME:-:80}
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - caddy_data:/data
      - caddy_config:/config

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: /usr/local/bin/entrypoint.sh

  mysql:
    image: mariadb:lts
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mariadb
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.4-alpine
    command: redis-server --appendonly yes --replica-read-only no
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: quay.io/minio/aistor/minio:latest
    command: minio server /mnt/data --license /minio.license
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-password12}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/mnt/data                                  # Storage
      - ./docker/minio/certs:/etc/minio/certs:ro              # SSL Certificate
      - ./docker/minio/license/minio.license:/minio.license   # MinIO License

volumes:
  minio_data:
  db_data:
  caddy_data:
  caddy_config:
  redis_data:
